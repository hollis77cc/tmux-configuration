# Unbind Ctrl+b and set Ctrl+a as the prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload configuration quickly with prefix + r after modifying the file
bind r source-file ~/.tmux.conf \; display-message "config reloaded.."

# Change pane splitting shortcuts for convenience: prefix + - (horizontal split), prefix + = (vertical split)
unbind '%'
bind - splitw -h -c '#{pane_current_path}'
unbind '"'
bind = splitw -v -c '#{pane_current_path}'

# Enable mouse support (equivalent to the old 4 commands in v2.1+)
set-option -g mouse on

# Quick pane navigation
# Bind hjkl keys for pane switching (up/down/left/right). -r allows repeated key presses within ~500ms, perfect for quick switching.
bind -r k select-pane -U # Bind k to Up
bind -r j select-pane -D # Bind j to Down
bind -r h select-pane -L # Bind h to Left
bind -r l select-pane -R # Bind l to Right

# Resize panes
# Bind Ctrl+hjkl to adjust pane edges (up/down/left/right)
bind -r C-k resize-pane -U 10 # Bind Ctrl+k to resize up by 10 cells
bind -r C-j resize-pane -D 10 # Bind Ctrl+j to resize down by 10 cells
bind -r C-h resize-pane -L 10 # Bind Ctrl+h to resize left by 10 cells
bind -r C-l resize-pane -R 10 # Bind Ctrl+l to resize right by 10 cells

# Copy mode
setw -g mode-keys vi # Enable vi-style keybindings (supports C-d, C-u, hjkl, etc.)
unbind p # Unbind 'p' (previous window) to use it for paste
bind b previous-window # Bind prefix + b to switch to the previous window

bind Escape copy-mode # Bind Esc to enter copy mode
# Updated syntax for tmux 2.4 and above
bind -T copy-mode-vi v send -X begin-selection # Bind 'v' to start selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel # Bind 'y' to copy selected text
bind p paste-buffer # Bind 'p' to paste text

# Set status bar position to top
set -g status-position top

# Set theme (ensure the file exists at this path)
source-file ~/.config/tmux/tokyonight/tokyonight_moon.tmux

# Set colors and enable true color support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Set terminal window titles
set -g set-titles on
set -g set-titles-string "#T"

# Set display time for panes and messages
set -g display-panes-time 2000
set -g display-time 2000

